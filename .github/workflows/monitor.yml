name: Package Monitor

on:
  schedule:
    - cron: '0 * * * *'  # every 1 hour
  workflow_dispatch:        # also allows manual run from GitHub Actions tab
    inputs:
      package:
        description: 'Force-check this package immediately (owner/repo for GitHub repos)'
        required: false
        default: ''
      registry:
        description: 'Registry for the forced package (default: GitHub)'
        required: false
        default: 'GitHub'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 now; silences deprecation warning

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Enrol packages from packages.yaml into DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python bulk_enroll.py

      - name: Run monitor job
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN:       ${{ secrets.GH_TOKEN }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_EMAIL_TO:     ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM:   ${{ secrets.ALERT_EMAIL_FROM }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          FORCE_PACKAGE:      ${{ inputs.package }}
          FORCE_REGISTRY:     ${{ inputs.registry || 'GitHub' }}
        run: python monitor_job.py
