# ─────────────────────────────────────────────────────────────────────────────
# Registry Intelligence Platform — Packages to Monitor
# ─────────────────────────────────────────────────────────────────────────────
#
# Add any package here. Run once:
#   python bulk_enroll.py
#
# After that, monitor_job.py re-checks everything daily — no UI needed.
#
# Supported registries:
#   NPM, PyPI, RubyGems, NuGet, Crates.io, Maven Central, GitHub,
#   Packagist, Homebrew, WordPress Plugins
#
# GitHub repos  → paste the full URL: https://github.com/owner/repo
# Maven         → use groupId:artifactId format: com.google.guava:guava
# Everything else → just the package name
# ─────────────────────────────────────────────────────────────────────────────

packages:

  # ── JavaScript / Node.js (NPM) ──────────────────────────────────────────────
